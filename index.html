<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!-- DM Sans: clean humanist sans-serif; approachable without being bland -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <!-- Lucide UMD build — sync script runs before deferred modules, so `lucide` global is
       guaranteed to exist when js/main.js executes -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ── App bar ── -->
<header class="app-bar">
  <!-- Hamburger: mobile-only toggle; hidden on desktop via CSS -->
  <button class="btn-icon sidebar-toggle-btn" id="sidebarToggleBtn"
          aria-label="Toggle notes list" aria-expanded="false">
    <i data-lucide="panel-left" aria-hidden="true"></i>
  </button>
  <div class="app-bar__logo" aria-hidden="true">
    <i data-lucide="notebook-pen"></i>
  </div>
  <span class="app-bar__title">Notes</span>
  <button class="btn btn-primary app-bar__new-btn" id="newNoteBtn" aria-label="Create new note">
    <i data-lucide="plus" aria-hidden="true"></i>
    New Note
  </button>
</header>

<!-- Mobile overlay — tap to dismiss sidebar without selecting a note -->
<div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar" aria-label="Notes list">
    <div class="sidebar__header">
      <div class="sidebar__header-row">
        <span class="sidebar__section-label">All Notes</span>
        <span class="sidebar__count-badge" id="noteCount" aria-live="polite"></span>
      </div>
      <div class="search-wrapper">
        <i data-lucide="search" class="search-icon" aria-hidden="true"></i>
        <input
          class="search-input"
          type="search"
          id="searchInput"
          placeholder="Search notes…"
          aria-label="Search notes"
          autocomplete="off"
        />
      </div>
    </div>
    <div class="notes-list" id="notesList" role="list"></div>
  </aside>

  <!-- ── Editor area ── -->
  <main class="editor-area" id="editorArea" aria-label="Note editor">

    <!-- Shown when no note is open -->
    <div class="no-note-selected" id="noNoteSelected">
      <div class="no-note-selected__icon" aria-hidden="true">
        <i data-lucide="file-text"></i>
      </div>
      <div class="no-note-selected__text">No note selected</div>
      <div class="no-note-selected__hint">Create a new note or pick one from the list</div>
      <!-- Action affordance in the empty state so users aren't stranded -->
      <div class="no-note-selected__cta">
        <button class="btn btn-primary" id="newNoteBtn2" aria-label="Create new note">
          <i data-lucide="plus" aria-hidden="true"></i>
          New Note
        </button>
      </div>
    </div>


    <div id="editorPanel" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="editor__toolbar">
        <div class="editor__meta">
          <span class="editor__date" id="editorDate" aria-label="Last modified"></span>
          <!-- Save indicator lives below the date; occupies reserved height so layout is stable -->
          <span class="editor__save-status hidden" id="saveStatus" aria-live="polite"></span>
        </div>
        <button class="btn-icon danger" id="deleteNoteBtn" aria-label="Delete note" title="Delete note">
          <i data-lucide="trash-2" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Scrollable writing surface; toolbar and footer are sticky outside this div -->
      <div class="editor__scroll">
        <div class="editor__content">
          <textarea
            class="editor__title-input"
            id="noteTitleInput"
            placeholder="Untitled"
            rows="1"
            aria-label="Note title"
          ></textarea>
          <!-- Divider creates clear visual separation between title and body -->
          <div class="editor__divider" aria-hidden="true"></div>
          <textarea
            class="editor__body-input"
            id="noteBodyInput"
            placeholder="Start writing…"
            aria-label="Note content"
          ></textarea>
        </div>
      </div>

      <!-- Stats bar — passive reference, not interactive -->
      <div class="editor__footer">
        <span class="editor__stat" id="wordCountStat">0 words</span>
        <span class="editor__stat" id="charCountStat">0 chars</span>
      </div>
    </div>

  </main>
</div>

<!-- Mobile FAB — floats above writing surface; FAB pattern is the de-facto standard
     for primary actions on mobile, more reachable than the top-right app bar button -->
<button class="fab" id="fabNewNoteBtn" aria-label="Create new note">
  <i data-lucide="plus" aria-hidden="true"></i>
</button>

<!-- Delete confirmation modal — aria-hidden toggled by showDeleteModal / hideDeleteModal in ui.js.
     Placed in static HTML so lucide.createIcons() on init captures the trash-2 icon inside it. -->
<div class="modal-backdrop" id="deleteModal" role="dialog" aria-modal="true"
     aria-labelledby="deleteModalTitle" aria-hidden="true">
  <div class="modal">
    <div class="modal__icon" aria-hidden="true">
      <i data-lucide="trash-2"></i>
    </div>
    <h2 class="modal__title" id="deleteModalTitle">Delete note?</h2>
    <p class="modal__body">This can't be undone. The note will be permanently removed.</p>
    <div class="modal__actions">
      <button class="btn btn-ghost" id="deleteModalCancel">Cancel</button>
      <button class="btn btn-danger" id="deleteModalConfirm">Delete</button>
    </div>
  </div>
</div>

<!-- Module defers automatically; Lucide UMD loaded above will have executed by then -->
<script type="module" src="js/main.js"></script>

</body>
</html>
